name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  RUST_VERSION: stable
  CACHE_KEY: rust-cache-ci

jobs:
  # Code quality checks - formatting and linting
  lint-rust:
    name: Lint and Format
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
        with:
          shared-key: ${{ env.CACHE_KEY }}

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (pedantic, zero warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic

  # Build verification
  build-rust:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
        with:
          shared-key: ${{ env.CACHE_KEY }}

      - name: Build project
        run: cargo build --workspace --all-features --verbose

      - name: Build tests
        run: cargo test --workspace --all-features --no-run

  # Test execution without database
  test-rust:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
        with:
          shared-key: ${{ env.CACHE_KEY }}

      - name: Run unit tests
        run: cargo test --workspace --all-features --all-targets --lib

  # Integration tests with database
  integration-test-rust:
    name: Integration Tests
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
        with:
          shared-key: ${{ env.CACHE_KEY }}

      - name: Run database migrations
        run: cargo install sqlx-cli --no-default-features --features postgres --force && sqlx migrate run

      - name: Run integration tests
        run: cargo test --workspace --all-features --test '*'

  # Code coverage with database
  coverage-rust:
    name: Code Coverage
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview

      - name: Cache dependencies
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
        with:
          shared-key: ${{ env.CACHE_KEY }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked --force

      - name: Run database migrations
        run: cargo install sqlx-cli --no-default-features --features postgres --force && sqlx migrate run

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 70 --html

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 30

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Run security audit
        run: |
          cargo install cargo-deny --locked
          cargo deny check advisories

  # All checks must pass
  ci-success:
    name: CI Success
    runs-on: ubuntu-22.04
    needs:
      - lint-rust
      - build-rust
      - test-rust
      - integration-test-rust
      - coverage-rust
      - security-audit
    steps:
      - name: Mark CI as successful
        run: echo "All CI checks passed successfully!"
