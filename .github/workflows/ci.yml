name: Continuous Integration
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-cache-ci
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy pedantic (zero tolerance)
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

  test-rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-cache-ci
      - name: Run tests
        run: cargo test --all-features --all-targets

  coverage-rust:
    runs-on: ubuntu-22.04
    continue-on-error: true  # Non-blocking for projects with no tests yet
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-cache-ci
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Test coverage (≥95% required once tests exist)
        run: |
          # Run coverage but don't fail on 0% for initial setup
          cargo llvm-cov --all-features --ignore-filename-regex '(main\.rs|models/mod\.rs|routes/mod\.rs|repository/mod\.rs)' || true
          cargo llvm-cov --all-features