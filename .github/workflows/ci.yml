name: Continuous Integration
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-cache-ci
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy pedantic (zero tolerance)
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

  test-rust:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-cache-ci
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx migrate run
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: cargo test --bins --all-features
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          RUST_LOG: debug
        run: cargo test --test database_integration --all-features -- --test-threads=1

  coverage-rust:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-cache-ci
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx migrate run
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --force
      - name: Test coverage (≥50% for Task 2 with database)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          RUST_LOG: debug
        run: cargo llvm-cov --all-features --fail-under-lines 50 -- --test-threads=1
