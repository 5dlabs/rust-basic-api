apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-basic-api
  labels:
    app: rust-basic-api
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: rust-basic-api
  template:
    metadata:
      labels:
        app: rust-basic-api
        tier: backend
    spec:
      containers:
      - name: rust-basic-api
        image: rust-basic-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: rust-basic-api-secrets
              key: database-url
        - name: RUST_LOG
          value: "rust_basic_api=info,tower_http=debug"
        - name: SERVER_PORT
          value: "3000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
      securityContext:
        fsGroup: 1001
---
apiVersion: v1
kind: Secret
metadata:
  name: rust-basic-api-secrets
type: Opaque
stringData:
  # IMPORTANT: Replace with actual database URL in production
  # This is a placeholder for local testing only
  database-url: "postgresql://postgres:postgres@postgres-service:5432/postgres"
