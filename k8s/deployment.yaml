apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-basic-api
  labels:
    app: rust-basic-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rust-basic-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rust-basic-api
        version: v1
    spec:
      containers:
      - name: rust-basic-api
        image: rust-basic-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: rust-basic-api-secrets
              key: database-url
        - name: SERVER_PORT
          value: "3000"
        - name: RUST_LOG
          value: "rust_basic_api=info,tower_http=debug"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
