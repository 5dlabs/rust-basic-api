version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rust-basic-api-postgres
    environment:
      POSTGRES_DB: rust_basic_api
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rust_basic_api"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rust-basic-api
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/rust_basic_api
      SERVER_PORT: 3000
      RUST_LOG: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
