version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: rust_basic_api
      POSTGRES_USER: rust
      POSTGRES_PASSWORD: rust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rust:rust@db:5432/rust_basic_api
      SERVER_PORT: 3000
      RUST_LOG: info
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
